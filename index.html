<!doctype html>
<html lang="pt">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <title>SplitWisely — Despesas partilhadas</title>
  <meta name="theme-color" content="#0f9d76" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="SplitWisely" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#/"><img class="brand-ico" src="icons/icon-mark.png" alt="" width="26" height="26" /> SplitWisely</a>
    <div class="topbar-right" id="topbar-user"></div>
  </header>

  <main id="app"></main>

  <!-- Ecrã de arranque: fica por cima de tudo enquanto os dados carregam -->
  <div id="splash" class="splash">
    <div class="splash-brand"><img src="icons/icon-512.png" alt="SplitWisely" /></div>
    <div class="spinner" role="status" aria-label="A carregar"></div>
  </div>

  <div id="toast" class="toast hidden"></div>

  <!-- Configuração opcional: copiar config.example.js para config.js -->
  <script src="config.js" onerror="void 0"></script>
  <script src="vendor/supabase.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      // Procurar uma versão nova a cada 60s. Com skipWaiting()+clients.claim()
      // no sw.js e o fetch network-first sem cache HTTP, a versão nova passa a
      // entrar sozinha — sem ter de limpar a cache à mão (mesmo padrão do SplitBill).
      navigator.serviceWorker.register("sw.js")
        .then((reg) => { setInterval(() => reg.update().catch(() => {}), 60000); })
        .catch(() => {});
    }
    // iOS Safari ignora "user-scalable=no": bloquear o pinch-zoom
    // (o double-tap zoom é tratado pelo touch-action: manipulation no CSS)
    document.addEventListener("gesturestart", (e) => e.preventDefault());
  </script>
</body>
</html>
